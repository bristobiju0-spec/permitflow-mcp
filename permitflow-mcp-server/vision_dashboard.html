<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PermitFlow | HVAC Vision Auditor</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Outfit', sans-serif;
            background: radial-gradient(circle at top left, #0f172a, #020617);
            color: #f8fafc;
            min-height: 100vh;
        }
        .glass {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .premium-border {
            border: 1px solid rgba(0, 191, 255, 0.3);
            box-shadow: 0 0 20px rgba(0, 191, 255, 0.1);
        }
        .animate-float {
            animation: float 6s ease-in-out infinite;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        .badge-pass {
            background: linear-gradient(135deg, #22c55e, #16a34a);
            box-shadow: 0 0 15px rgba(34, 197, 94, 0.5);
        }
        .badge-fail {
            background: linear-gradient(135deg, #ef4444, #dc2626);
            box-shadow: 0 0 15px rgba(239, 68, 68, 0.5);
        }
        .spinner {
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-top: 3px solid #3b82f6;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        function App() {
            const [image, setImage] = useState(null);
            const [preview, setPreview] = useState(null);
            const [analyzing, setAnalyzing] = useState(false);
            const [result, setResult] = useState(null);
            const [compliance, setCompliance] = useState(null);

            const handleUpload = (e) => {
                const file = e.target.files[0];
                if (file) {
                    setImage(file);
                    setPreview(URL.createObjectURL(file));
                    runWorkflow(file);
                }
            };

            const runWorkflow = async (file) => {
                setAnalyzing(true);
                setResult(null);
                setCompliance(null);

                // Simulation: Gemini 3.1 Pro Vision Extraction
                await new Promise(r => setTimeout(r, 2000));
                const extractedData = {
                    model_number: "58SB0A070E17--12",
                    seer2: 13.0 // Matches generated image (13.0 < 15.0)
                };
                setResult(extractedData);

                // Simulation: @permitflow-engine check_ca_compliance
                await new Promise(r => setTimeout(r, 1500));
                
                // Real check based on our MCP tool logic (SEER2 < 15.0 fails)
                const isCompliant = extractedData.seer2 >= 15.0;
                setCompliance({
                    is_compliant: isCompliant,
                    status: isCompliant ? "APPROVED" : "REJECTED",
                    reason: isCompliant ? "Meets 2026 CEC Standards" : `SEER2 ${extractedData.seer2} is below required 15.0`
                });

                setAnalyzing(false);
            };

            return (
                <div className="max-w-4xl mx-auto px-6 py-12">
                    <header className="mb-12 text-center">
                        <h1 className="text-5xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-blue-400 to-cyan-300 mb-4">
                            PermitFlow Vision
                        </h1>
                        <p className="text-slate-400 text-lg">Autonomous HVAC Regulatory Auditor</p>
                    </header>

                    <div className="grid grid-cols-1 md:grid-cols-2 gap-8">
                        {/* Upload Section */}
                        <div className={`glass p-8 rounded-3xl flex flex-col items-center justify-center transition-all ${!preview ? 'border-dashed border-2 border-slate-700 hover:border-blue-500 cursor-pointer' : 'premium-border'}`}>
                            {!preview ? (
                                <label className="w-full text-center cursor-pointer py-20">
                                    <input type="file" className="hidden" onChange={handleUpload} accept="image/*" />
                                    <div className="text-5xl mb-4">📸</div>
                                    <p className="text-slate-300 font-semibold">Upload HVAC Nameplate</p>
                                    <p className="text-slate-500 text-sm mt-2">Gemini 3.1 Pro will analyze specs</p>
                                </label>
                            ) : (
                                <div className="relative w-full aspect-square rounded-2xl overflow-hidden group">
                                    <img src={preview} className="w-full h-full object-cover" />
                                    
                                    {/* Compliance Badge */}
                                    {compliance && (
                                        <div className={`absolute top-4 right-4 px-4 py-2 rounded-full text-white font-bold text-sm tracking-widest uppercase animate-float ${compliance.is_compliant ? 'badge-pass' : 'badge-fail'}`}>
                                            {compliance.is_compliant ? 'Pass' : 'Fail'}
                                        </div>
                                    )}
                                    
                                    <button 
                                        onClick={() => {setPreview(null); setResult(null); setCompliance(null);}}
                                        className="absolute bottom-4 left-1/2 -translate-x-1/2 glass px-4 py-2 rounded-xl text-xs hover:bg-white/10 opacity-0 group-hover:opacity-100 transition-opacity"
                                    >
                                        Retake Photo
                                    </button>
                                </div>
                            )}
                        </div>

                        {/* Analysis Section */}
                        <div className="glass p-8 rounded-3xl">
                            <h2 className="text-xl font-semibold mb-6 flex items-center gap-2">
                                <span className="w-2 h-6 bg-blue-500 rounded-full"></span>
                                Audit Insights
                            </h2>

                            {!analyzing && !result && (
                                <div className="text-slate-500 italic py-12 text-center">
                                    Upload an image to start the autonomous compliance check...
                                </div>
                            )}

                            {analyzing && (
                                <div className="space-y-6 py-8">
                                    <div className="flex items-center gap-3">
                                        <div className="spinner"></div>
                                        <p className="text-blue-400 animate-pulse">Gemini 3.1 Pro extracting metrics...</p>
                                    </div>
                                    <div className="w-full bg-slate-800 h-1 rounded-full overflow-hidden">
                                        <div className="bg-blue-500 h-full w-1/3 animate-[loading_2s_ease-in-out_infinite]"></div>
                                    </div>
                                </div>
                            )}

                            {result && (
                                <div className="space-y-6">
                                    <div className="grid grid-cols-2 gap-4">
                                        <div className="bg-white/5 p-4 rounded-2xl">
                                            <p className="text-slate-500 text-xs mb-1 uppercase tracking-wider">Model Number</p>
                                            <p className="font-mono text-blue-300">{result.model_number}</p>
                                        </div>
                                        <div className="bg-white/5 p-4 rounded-2xl">
                                            <p className="text-slate-500 text-xs mb-1 uppercase tracking-wider">Efficiency (SEER2)</p>
                                            <p className="text-2xl font-bold">{result.seer2.toFixed(1)}</p>
                                        </div>
                                    </div>

                                    {compliance && (
                                        <div className={`p-6 rounded-2xl ${compliance.is_compliant ? 'bg-green-500/10 border border-green-500/20' : 'bg-red-500/10 border border-red-500/20'}`}>
                                            <div className="flex items-center gap-2 mb-2">
                                                <span className={`w-2 h-2 rounded-full ${compliance.is_compliant ? 'bg-green-400' : 'bg-red-400'}`}></span>
                                                <p className={`font-bold uppercase tracking-widest text-sm ${compliance.is_compliant ? 'text-green-400' : 'text-red-400'}`}>
                                                    {compliance.status}
                                                </p>
                                            </div>
                                            <p className="text-slate-300 text-sm leading-relaxed">
                                                {compliance.reason}
                                            </p>
                                            <p className="text-slate-500 text-[10px] mt-4 uppercase">Source: @permitflow-engine (2026 CEC Part 6)</p>
                                        </div>
                                    )}
                                </div>
                            )}
                        </div>
                    </div>

                    <footer className="mt-20 text-center opacity-30 text-xs tracking-widest uppercase">
                        Vertical AI Micro-SaaS for HVAC Compliance & Compliance Systems
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
    <style>
        @keyframes loading {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(300%); }
        }
    </style>
</body>
</html>
