name: Wake Up Agent
on:
  schedule:
    - cron: '0 */4 * * *' # Runs every 4 hours for free
jobs:
  ping_agent:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Marketing Loop
        run: |
          curl -X POST https://your-app.vercel.app/api/marketing-worker \
          -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}"
